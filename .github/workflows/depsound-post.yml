# depsound dogfooding, the POST half: posts the report onto this repo's own
# dependency-update PRs. The copyable template for other repos is in
# examples/depsound-post.yml.
name: depsound-post
on:
  workflow_run:
    workflows: [depsound]
    types: [completed]

permissions:
  pull-requests: write # upsert the sticky comment
  checks: write        # set the neutral check
  actions: read        # download the report artifact from the compute run

jobs:
  post:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    steps:
      - uses: rvagg/depsound-action/post@e1e774682c78f837dce621d0d67f028e65f2afe8 # v0.2.7
