# depsound dogfooding, the COMPUTE half: reviews this repo's own
# dependency-update PRs. The copyable template for other repos is in
# examples/depsound.yml.
name: depsound
on:
  pull_request:

permissions:
  contents: read # checkout + diff the PR's manifests; no write, never posts

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: rvagg/depsound-action@bbabaf9e00c0b558bb1950b7437b3069cc9cfe6d # v0.2.5
