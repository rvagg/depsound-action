# depsound dogfooding, the COMPUTE half: reviews this repo's own
# dependency-update PRs. The copyable template for other repos is in
# examples/depsound.yml.
name: depsound
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: rvagg/depsound-action@master
