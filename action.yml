name: depsound
description: Review dependency changes on a PR with depsound and upload the report. Evidence, never a verdict.
author: Rod Vagg
branding:
  icon: search
  color: purple

inputs:
  manifests:
    description: >
      Newline-separated manifest/lockfile BASE NAMES to watch on a PR, matched
      at any path (monorepo nested files included). The defaults are the
      per-ecosystem resolution files: a committed lockfile pins exact versions
      and transitive deps, so it is watched in preference to the declaration
      file (package.json / Cargo.toml). CAVEAT: a repo that commits NO lockfile
      (common for npm and crates LIBRARIES) is not detected yet, its changes
      live only in the declaration file, which detection does not read. go.mod
      is always both declaration and resolution, so Go is unaffected.
      github-actions manifests (.github/workflows/*.yml and composite
      action.yml/action.yaml) are ALWAYS detected regardless of this list, from
      their pinned `uses:` refs.
    required: false
    default: |
      go.mod
      package-lock.json
      pnpm-lock.yaml
      Cargo.lock
  deps:
    description: >
      Override: a newline-separated depsound list to review (`<eco>:<name> <from>
      <to>` bump, `<eco>:<name> <version>` new dep, or `redirect <eco>:<name>
      <target>`). When set, PR detection is skipped. Eco is npm, go, crates, gha.
    required: false
    default: ""
  depsound-version:
    description: The depsound release tag to download and pin.
    required: false
    default: v0.29.0
  cooldown:
    description: Days, forwarded to depsound --cooldown to match an install cooldown.
    required: false
    default: ""
  github-token:
    description: Token used to download the pinned depsound release (and checkout the PR to diff its manifests).
    required: false
    default: ${{ github.token }}

outputs:
  markdown:
    description: The PR-comment markdown body rendered by depsound.
    value: ${{ steps.run.outputs.markdown }}
  title:
    description: One-line check title.
    value: ${{ steps.run.outputs.title }}
  tripped:
    description: "true unless the headline reads 'no signals tripped'."
    value: ${{ steps.run.outputs.tripped }}

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.deps == '' }} # detection needs the tree; an override does not
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0 # need base..head history for the merge-base manifest diff
        persist-credentials: false

    - name: Download and verify depsound
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        VERSION: ${{ inputs.depsound-version }}
      run: |
        set -euo pipefail
        os=$(uname -s | tr '[:upper:]' '[:lower:]')
        arch=$(uname -m)
        case "$arch" in x86_64) arch=amd64 ;; aarch64|arm64) arch=arm64 ;; esac
        ver="${VERSION#v}"
        case "$os" in
          linux)  asset="depsound_${ver}_linux_${arch}.tar.gz" ;;
          darwin) asset="depsound_${ver}_darwin_all.zip" ;;
          *) echo "::error::unsupported runner OS: $os" ; exit 1 ;;
        esac
        dir="$RUNNER_TEMP/depsound-bin"
        mkdir -p "$dir"
        gh release download "$VERSION" --repo rvagg/depsound --dir "$dir" \
          --pattern "$asset" --pattern checksums.txt --clobber
        # verify against the release's own checksums: a corrupt-download check,
        # not an independent anchor against a compromised release
        ( cd "$dir"
          if command -v sha256sum >/dev/null; then verify="sha256sum -c -"; else verify="shasum -a 256 -c -"; fi
          grep " ${asset}\$" checksums.txt | $verify )
        ( cd "$dir" && case "$asset" in *.zip) unzip -oq "$asset" ;; *) tar xzf "$asset" ;; esac )
        echo "$dir" >> "$GITHUB_PATH"

    - name: Detect dependency changes
      id: detect
      shell: bash
      env:
        DEPS_IN: ${{ inputs.deps }}
        MANIFESTS: ${{ inputs.manifests }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail
        list="$RUNNER_TEMP/depsound-deps.txt"
        : > "$list"
        if [ -n "${DEPS_IN//[[:space:]]/}" ]; then
          printf '%s\n' "$DEPS_IN" > "$list" # explicit override wins
        elif [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
          # the diff only says WHICH manifests changed; the change set comes
          # from parsing both full versions (detect), never from diff text
          mb=$(git merge-base "$BASE_SHA" "$HEAD_SHA")
          declare -A want
          while IFS= read -r m; do m="${m//[[:space:]]/}"; [ -n "$m" ] && want["$m"]=1; done <<< "$MANIFESTS"
          pairs="$RUNNER_TEMP/depsound-pairs.tsv"
          : > "$pairs"
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            base="${f##*/}"; dir="${f%/*}"
            # keep a changed file for detection if it is a configured
            # lockfile/manifest (by base name), OR a github-actions manifest by
            # LOCATION: a workflow under .github/workflows/, or a composite
            # action.yml/action.yaml. depsound's detect parses their `uses:` pins.
            keep=
            if [ -n "${want[$base]:-}" ]; then keep=1; fi
            case "$dir" in
              */.github/workflows|.github/workflows) case "$base" in *.yml|*.yaml) keep=1 ;; esac ;;
            esac
            case "$base" in action.yml|action.yaml) keep=1 ;; esac
            [ -n "$keep" ] || continue
            oldf=$(mktemp); git show "$mb:$f"       > "$oldf" 2>/dev/null || oldf="-"
            newf=$(mktemp); git show "$HEAD_SHA:$f"  > "$newf" 2>/dev/null || newf="-"
            printf '%s\t%s\t%s\n' "$f" "$oldf" "$newf" >> "$pairs"
          done < <(git diff --name-only "$mb" "$HEAD_SHA")
          [ -s "$pairs" ] && depsound detect --file="$pairs" > "$list"
        else
          echo "no pull_request base/head available; nothing to detect"
        fi
        if [ -s "$list" ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
        echo "list-file=$list" >> "$GITHUB_OUTPUT"

    - name: Run depsound
      id: run
      shell: bash
      env:
        LIST: ${{ steps.detect.outputs.list-file }}
        CHANGED: ${{ steps.detect.outputs.changed }}
        COOLDOWN: ${{ inputs.cooldown }}
        VERSION: ${{ inputs.depsound-version }}
      run: |
        set -euo pipefail
        if [ "$CHANGED" != "true" ] || [ ! -s "$LIST" ]; then
          echo "no dependency changes to review"
          echo "tripped=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        out="$RUNNER_TEMP/depsound-report"
        mkdir -p "$out"
        common=(bulk --file="$LIST")
        [ -n "$COOLDOWN" ] && common+=("--cooldown=$COOLDOWN")
        depsound "${common[@]}" --format=markdown > "$out/comment.md"
        depsound "${common[@]}" --format=json    > "$out/report.json"
        title=$(sed -n 's/^<!-- depsound-title: \(.*\) -->$/\1/p' "$out/comment.md" | head -1)
        # derive tripped from depsound's authoritative title, never a body grep: a
        # mixed PR foots "N others: no signals tripped", which a body grep misreads
        # as clean. Unknown title errs toward flagging (silence is not safety).
        case "$title" in
          *"flagged for review"*) tripped=true ;;
          *"no signals tripped"*) tripped=false ;;
          *) tripped=true ;;
        esac
        pr=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")
        # version pins the reproduce command to the exact analyzer run
        jq -n --arg pr "$pr" --arg title "$title" --arg ver "$VERSION" --argjson tripped "$tripped" \
          '{pr: $pr, title: $title, version: $ver, tripped: $tripped}' > "$out/meta.json"
        {
          echo "title=$title"
          echo "tripped=$tripped"
          echo "report-dir=$out"
          echo "markdown<<__DEPSOUND_MD__"
          cat "$out/comment.md"
          echo "__DEPSOUND_MD__"
        } >> "$GITHUB_OUTPUT"

    - name: Failure report
      id: fail
      if: ${{ failure() }} # any earlier step died: leave a report so the poster still speaks
      shell: bash
      run: |
        out="$RUNNER_TEMP/depsound-report"
        mkdir -p "$out"
        # only synthesize a failure marker if a real report was not produced
        if [ ! -f "$out/meta.json" ]; then
          pr=$(jq -r '.pull_request.number // empty' "$GITHUB_EVENT_PATH")
          jq -n --arg pr "$pr" '{pr: $pr, failed: true, title: "depsound: analysis incomplete"}' > "$out/meta.json"
        fi
        echo "report=true" >> "$GITHUB_OUTPUT"

    - name: Upload report
      # upload on success (a produced report) OR failure (the synthesized marker),
      # so a compute failure is not silent; a no-change run uploads nothing
      if: ${{ always() && (steps.run.outputs.report-dir != '' || steps.fail.outputs.report == 'true') }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: depsound-report
        path: ${{ runner.temp }}/depsound-report
        if-no-files-found: ignore
