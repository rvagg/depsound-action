# Copy into .github/workflows/ of the repo you want reviewed, alongside
# depsound.yml. Review needs two workflows; the README explains why.
#
# This one POSTS: it runs after depsound.yml completes, downloads the report
# ARTIFACT, and upserts the sticky comment + neutral check. It runs in a
# workflow_run context that carries the repo's write token (so it works even
# for Dependabot and fork PRs, whose own token is read-only), and it never
# checks out or runs any PR code, which is what keeps that token safe.
name: depsound-post
on:
  workflow_run:
    workflows: [depsound]
    types: [completed]

permissions:
  pull-requests: write # upsert the sticky comment
  checks: write        # set the neutral check
  actions: read        # download the report artifact from the compute run

jobs:
  post:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    steps:
      - uses: rvagg/depsound-action/post@2c5a7429aa5baaf8a79e12724a296282cd73e5ee # v0.2.1
