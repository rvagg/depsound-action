# Copy into .github/workflows/ of the repo you want reviewed, alongside
# depsound-post.yml. Review needs two workflows; the README explains why.
#
# This one computes: on every PR (read-only) it diffs the changed dependency
# manifests, runs depsound, and uploads the report as an artifact.
name: depsound
on:
  pull_request:

permissions:
  contents: read # checkout + diff the PR's manifests; no write, never posts

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: rvagg/depsound-action@e1e774682c78f837dce621d0d67f028e65f2afe8 # v0.2.7
