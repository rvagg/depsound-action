# Copy into .github/workflows/ of the repo you want reviewed, alongside
# depsound-post.yml. Review needs two workflows; the README explains why.
#
# This one COMPUTES: it runs on every PR (read-only), works out the changed
# dependencies, runs depsound, and uploads the report as an artifact.
name: depsound
on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: rvagg/depsound-action@master # pin a commit SHA (see Pinning)
