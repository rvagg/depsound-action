name: depsound post
description: Post a depsound report (sticky comment + neutral check) from a workflow_run job.
author: Rod Vagg
branding:
  icon: message-square
  color: purple

inputs:
  github-token:
    description: Token used to download the report artifact and post the comment + check.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - name: Download report
      continue-on-error: true # no artifact = no dependency changes = nothing to post
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: depsound-report
        path: report
        # same-run (pull_request_target, the recommended layout) downloads from
        # this run; the legacy workflow_run split names the compute run
        run-id: ${{ github.event.workflow_run.id || github.run_id }}
        github-token: ${{ inputs.github-token }}

    - name: Upsert comment and set check
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ inputs.github-token }}
        retries: 3 # absorb transient 5xx/network on the check + comment writes
        script: |
          const fs = require('fs');

          let meta;
          try {
            meta = JSON.parse(fs.readFileSync('report/meta.json', 'utf8'));
          } catch (e) {
            // no artifact = no dependency changes = nothing to review, stay silent
            core.info('no depsound report to post (no dependency changes)');
            return;
          }

          const { owner, repo } = context.repo;
          // same-run mode (pull_request_target): the PR event is the trusted
          // identity source; legacy workflow_run mode reads its compute run
          const pull = context.payload.pull_request;
          const run = context.payload.workflow_run || {
            head_sha: pull && pull.head.sha,
            html_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
          };
          const marker = '<!-- depsound -->';
          const title = meta.title || 'depsound';
          const failed = meta.failed === true;

          // depsound owns the wording on success; on failure the poster speaks
          // so a broken analysis never reads as a clean, silent approval
          let body;
          if (failed) {
            body = `**depsound** · analysis incomplete\n\n`
              + `depsound could not complete its review of this PR's dependency `
              + `changes (see the run logs). This is not a clean result: the `
              + `changes were not assessed.\n`;
          } else {
            body = fs.readFileSync('report/comment.md', 'utf8');
          }

          // reproduce pinned to the exact depsound version plus links
          const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
          let refs = [];
          try {
            refs = JSON.parse(fs.readFileSync('report/report.json', 'utf8')).map(r => r.ref).filter(Boolean);
          } catch (e) { /* no report.json (failure or grouped): generic placeholder */ }

          const runCmd = `go run github.com/rvagg/depsound/cmd/depsound@${meta.version || 'latest'}`;
          const reproduce = refs.length === 1
            ? `<code>${runCmd} ${esc(refs[0].replace(' -> ', ' '))}</code>`
            : `<code>${runCmd} &lt;eco&gt;:&lt;name&gt; &lt;from&gt; &lt;to&gt;</code>`;

          // the local run does far more than the summary above: the full
          // per-file analysis plus a persisted, grep-able workspace an agent
          // can read. Lead varies by state so a clean result still invites a
          // look ("no flags" is a start, not a pass), a flagged one says dig in.
          const reproLead = failed
            ? `Run depsound locally to reproduce and inspect:`
            : meta.tripped === false
              ? `This is a starting point, not a pass. Run locally for full analysis and grep-able workspace (trees + stats.json) for agent investigation:`
              : `Continue locally, the full per-file analysis and a grep-able workspace (trees + stats.json) are available for agent investigation:`;
          const skillUrl = 'https://github.com/rvagg/depsound/blob/master/skills/review-dependency-change/SKILL.md';
          const footer =
            `${reproLead}\n`
            + `<blockquote>${reproduce}</blockquote>\n`
            + `Or hand this PR to an agent: point it at the PR and the <a href="${skillUrl}">review skill</a> for a proceed/hold call.\n\n`
            + `<sub><a href="https://github.com/rvagg/depsound">depsound</a> · <a href="${run.html_url}">full report + logs</a></sub>`;
          const withExtras = body.includes(marker)
            ? body.replace(marker, `\n\n${footer}\n${marker}`)
            : `${body}\n\n${footer}\n${marker}`;

          // the check and the comment are independent writes: one failing must
          // not suppress the other's attempt. retries (set on the step) absorb
          // transient 5xx; a write that still fails is recorded so the job goes
          // red (and re-runnable) instead of silently dropping the post. The
          // check upserts on the SHA so reruns do not pile up.
          const failures = [];
          try {
            const { data } = await github.rest.checks.listForRef({ owner, repo, ref: run.head_sha, check_name: 'depsound' });
            const params = {
              owner, repo, name: 'depsound', head_sha: run.head_sha,
              status: 'completed', conclusion: 'neutral',
              output: { title, summary: title },
            };
            const existingCheck = data.check_runs && data.check_runs[0];
            if (existingCheck) {
              await github.rest.checks.update({ ...params, check_run_id: existingCheck.id });
            } else {
              await github.rest.checks.create(params);
            }
          } catch (e) {
            failures.push(`check: ${e.message}`);
            core.warning(`depsound check write failed: ${e.message}`);
          }

          // the trusted event names the PR whenever present; only the legacy
          // workflow_run split falls back to the artifact's meta.pr (which a
          // PR-controlled compute could have forged; the same-run layout
          // removes that boundary entirely)
          const pr = pull ? pull.number : Number(meta.pr);
          if (pr) {
            try {
              // sticky upsert: adopt only a bot-authored marked comment (ours),
              // never one a PR author planted with the marker (they are a User)
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: pr, per_page: 100,
              });
              const existing = comments.find(c =>
                c.body && c.body.includes(marker) && c.user && c.user.type === 'Bot');
              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: withExtras });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: pr, body: withExtras });
              }
            } catch (e) {
              failures.push(`comment: ${e.message}`);
              core.warning(`depsound comment write failed: ${e.message}`);
            }
          } else {
            core.info('no PR number in report; posted the check only');
          }

          // a write that survived every retry is a real failure: surface it so
          // the run is red and offers a re-run, never a swallowed silent drop.
          if (failures.length) {
            core.setFailed(`depsound post incomplete after retries (${failures.join('; ')}); re-run this job to retry.`);
          }
